    <style>
        .music-btn {
    position: fixed;
    top: 15px;
    left: 15px;
    z-index: 999;
    font-size: 20px;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.2);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    backdrop-filter: blur(6px);
    transition: 0.2s;
}

.music-btn:hover {
    transform: scale(1.1);
    background: rgba(255,255,255,0.1);
}
    :root {
        --accent: #ffffff;
        --white: #ffffff;
        --dim: rgba(240,237,232,0.55);
        --overlay: rgba(0,0,0,0.55);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        min-height: 100vh;
        font-family: 'Space Mono', monospace;
        color: var(--white);
        overflow-x: hidden;
        cursor: default;
    }

    /* ── BACKGROUND ── */
    #bg-img {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
    filter: brightness(0.45) saturate(0.3);
}

    /* ── LAYOUT ── */
    .page {
        position: relative; z-index: 2;
        min-height: 100vh;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        padding: 40px 20px 120px;
        gap: 18px;
    }

    /* ── AVATAR ── */
  .avatar-wrap {
    width: 108px;
    height: 108px;
}

.avatar-wrap img {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid rgba(255,255,255,0.15);
}
    /* ── USERNAME ── */
    .username {
        font-family: 'Cormorant Garamond', serif;
        font-size: clamp(2rem, 7vw, 3.2rem);
        font-weight: 300; letter-spacing: 0.08em;
        animation: fadeDown 0.9s 0.1s ease both;
    }

    /* ── BIO ── */
    .bio {
        font-size: 0.72rem; color: var(--dim);
        letter-spacing: 0.12em;
        animation: fadeDown 0.9s 0.2s ease both;
    }

    .stats span { display: flex; align-items: center; gap: 5px; }
    .stats .val { color: var(--white); font-weight: 700; font-size: 0.78rem; }

    /* ── SOCIAL ICONS ── */
    .socials {
        display: flex; gap: 14px; flex-wrap: wrap; justify-content: center;
        animation: fadeDown 0.9s 0.3s ease both;
    }
    .socials a {
        display: flex; align-items: center; justify-content: center;
        width: 44px; height: 44px; border-radius: 50%;
        background: rgba(238, 4, 4, 0.06);
        border: 1px solid rgba(255,255,255,0.12);
        text-decoration: none; color: var(--white);
        transition: background 0.25s, border-color 0.25s, transform 0.2s;
        backdrop-filter: blur(6px);
    }
    .socials a:hover {
        background: rgba(224,82,82,0.25);
        border-color: var(--accent);
        transform: translateY(-3px) scale(1.1);
    }
    .socials a svg { width: 20px; height: 20px; fill: currentColor; }

    /* ── UPLOAD OVERLAYS ── */
    .upload-hint {
        position: fixed; bottom: 105px; left: 50%; transform: translateX(-50%);
        font-size: 0.6rem; color: var(--dim); letter-spacing: 0.1em;
        z-index: 99; pointer-events: none;
        animation: pulse 2s ease-in-out infinite;
    }

    .change-bg-btn {
        position: fixed; top: 16px; right: 16px; z-index: 200;
        background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
        color: var(--white); font-family: 'Space Mono', monospace;
        font-size: 0.62rem; letter-spacing: 0.1em;
        padding: 8px 14px; border-radius: 30px; cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.2s;
    }
    .change-bg-btn:hover { background: rgba(224,82,82,0.2); border-color: var(--accent); }
    #bg-upload { display: none; }

    .change-avatar-btn {
        position: absolute; bottom: 0; right: 0;
        background: var(--accent); border: none;
        width: 26px; height: 26px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        cursor: pointer; font-size: 13px;
    }
    #avatar-upload { display: none; }

    /* ── KEYFRAMES ── */
    @keyframes fadeDown {
        from { opacity: 0; transform: translateY(-18px); }
        to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes slideUp {
        from { opacity: 0; transform: translateX(-50%) translateY(30px); }
        to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    @keyframes pulse {
        0%,100% { opacity: 0.4; } 50% { opacity: 0.8; }
    }

    audio { display: none; }
    </style>

    <script>

        const music = document.getElementById("bg-music");
const btn = document.querySelector(".music-btn");

let isPlaying = false;

// autoplay quand l'utilisateur clique n'importe où
document.addEventListener("click", () => {
    if (!isPlaying) {
        music.play();
        isPlaying = true;
    }
});

function toggleMusic() {
    if (music.paused) {
        music.play();
        btn.textContent = "🔊";
    } else {
        music.pause();
        btn.textContent = "🔇";
    }
}

    const audio = document.getElementById('audio');
    const playIcon = document.getElementById('play-icon');
    const progress = document.getElementById('progress');
    const curTime = document.getElementById('cur-time');
    const durTime = document.getElementById('dur-time');

    function fmt(s) {
        const m = Math.floor(s / 60);
        const ss = Math.floor(s % 60).toString().padStart(2,'0');
        return `${m}:${ss}`;
    }

    function togglePlay() {
        if (audio.src && audio.src !== window.location.href) {
        audio.paused ? audio.play() : audio.pause();
        }
    }

    audio.addEventListener('play', () => {
        playIcon.innerHTML = '<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';
    });
    audio.addEventListener('pause', () => {
        playIcon.innerHTML = '<path d="M8 5v14l11-7z"/>';
    });
    audio.addEventListener('timeupdate', () => {
        if (!audio.duration) return;
        progress.value = (audio.currentTime / audio.duration) * 100;
        curTime.textContent = fmt(audio.currentTime);
        durTime.textContent = fmt(audio.duration);
    });

    function seek(v) {
        if (audio.duration) audio.currentTime = (v / 100) * audio.duration;
    }
    function prevTrack() { if (audio.duration) audio.currentTime = Math.max(0, audio.currentTime - 10); }
    function nextTrack() { if (audio.duration) audio.currentTime = Math.min(audio.duration, audio.currentTime + 10); }

    function changeCover(input) {
        if (!input.files[0]) return;
        const url = URL.createObjectURL(input.files[0]);
        document.getElementById('cover-ph').style.display = 'none';
        const img = document.getElementById('cover-img');
        img.src = url; img.style.display = 'block';
    }

    function changeAudio(input) {
        if (!input.files[0]) return;
        audio.src = URL.createObjectURL(input.files[0]);
        document.getElementById('track-name').textContent = input.files[0].name.replace(/\.[^.]+$/, '');
        audio.play();
    }

    function changeBg(input) {
        if (!input.files[0]) return;
        const url = URL.createObjectURL(input.files[0]);
        const type = input.files[0].type;
        if (type.startsWith('video/')) {
        const v = document.getElementById('bg-video');
        v.src = url; v.style.display = 'block';
        document.getElementById('bg-img').style.display = 'none';
        } else {
        const i = document.getElementById('bg-img');
        i.src = url; i.style.display = 'block';
        document.getElementById('bg-video').style.display = 'none';
        }
    }

    function changeAvatar(input) {
        if (!input.files[0]) return;
        const url = URL.createObjectURL(input.files[0]);
        document.getElementById('avatar-ph').style.display = 'none';
        const img = document.getElementById('avatar-img');
        img.src = url; img.style.display = 'block';
    }
    </script>
