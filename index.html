<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NONI - Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body, html {
  height: 100%; width: 100%; overflow: hidden;
  font-family: 'Arial', sans-serif;
  background-color: transparent;
}

/* z-index: -2 → image de fond, tout en dessous */
.image-background {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background-size: cover; background-position: center; background-repeat: no-repeat;
  z-index: 0;
  transition: background-image 1s ease-in-out;
}

/* z-index: 1 → overlay sombre, au-dessus de l'image */
.overlay {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.5);
  z-index: 1;
}

/* z-index: 2 → NEIGE, au-dessus de l'overlay ET de l'image */
#snow-container {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none;
  z-index: 2;
}

/* z-index: 3 → contenu texte/boutons, tout en haut */
.content-container {
  display: flex; justify-content: center; align-items: center;
  height: 100vh; flex-direction: column;
  color: white; text-align: center;
  position: relative;
  z-index: 3;
}

h1 {
  font-family: 'Press Start 2P', cursive;
  font-size: 4rem; color: #ff0000;
  text-shadow: 4px 4px 0px #000, 0 0 20px rgba(255, 0, 0, 0.7);
  margin-bottom: 30px; line-height: 1.5;
  animation: pulse 2s infinite ease-in-out;
}

h5 {
  font-family: 'Press Start 2P', cursive;
  font-size: 1.2rem;
  text-shadow: 2px 2px 0px #000;
  margin-bottom: 40px;
}

.social-links {
  display: flex; gap: 25px; justify-content: center;
  align-items: center; margin-top: 10px;
}

.social-link {
  text-decoration: none; display: flex; justify-content: center;
  align-items: center; width: 60px; height: 60px;
  border: 3px solid white; border-radius: 12px;
  transition: all 0.3s ease; background: rgba(0, 0, 0, 0.6);
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
}

.social-link i { font-size: 2rem; color: white; transition: all 0.3s ease; }

.social-link:hover {
  transform: translateY(-5px) scale(1.1);
  box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
  background: rgba(255, 255, 255, 0.1);
  border-color: #ff0000;
}

.social-link.steam:hover i    { color: #1b2838; text-shadow: 0 0 15px #1b2838; }
.social-link.discord:hover i  { color: #7289da; text-shadow: 0 0 15px #7289da; }
.social-link.instagram:hover i{ color: #e1306c; text-shadow: 0 0 15px #e1306c; }

.music-btn {
  position: fixed; top: 20px; right: 20px;
  background: rgba(0, 0, 0, 0.5); color: white;
  border: 2px solid white; padding: 10px 20px;
  font-family: 'Press Start 2P', cursive; font-size: 1rem;
  cursor: pointer; border-radius: 8px; transition: all 0.3s ease;
  backdrop-filter: blur(3px);
  z-index: 10;
  box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.music-btn:hover {
  background: rgba(255, 0, 0, 0.6);
  transform: scale(1.1);
  box-shadow: 0 0 15px rgba(255, 0, 0, 0.8);
}

@keyframes pulse {
  0%   { transform: scale(1);    text-shadow: 4px 4px 0px #000, 0 0 10px rgba(255,0,0,0.5); }
  50%  { transform: scale(1.05); text-shadow: 4px 4px 0px #000, 0 0 25px rgba(255,0,0,0.9); }
  100% { transform: scale(1);    text-shadow: 4px 4px 0px #000, 0 0 10px rgba(255,0,0,0.5); }
}

@keyframes fall {
  0%   { transform: translateY(-10vh) rotate(0deg);   opacity: 1; }
  100% { transform: translateY(110vh) rotate(360deg); opacity: 0.2; }
}
</style>
</head>
<body>

<div class="image-background" id="randomBg"></div>
<div class="overlay"></div>
<div id="snow-container"></div>

<button class="music-btn" id="musicBtn">🎵 Musique: OFF</button>

<div class="content-container">
  <h1>NONI</h1>
  <h5>Born in love, died in hate</h5>
  <div class="social-links">
    <a href="https://discord.gg/uR39NSjMzu" target="_blank" class="social-link discord" title="Discord">
      <i class="fa-brands fa-discord"></i>
    </a>
    <a href="https://www.instagram.com/cfxdata_" target="_blank" class="social-link instagram" title="Instagram">
      <i class="fa-brands fa-instagram"></i>
    </a>
    <a href="https://steamcommunity.com/profiles/76561199206890333/" target="_blank" class="social-link steam" title="Steam">
      <i class="fa-brands fa-steam"></i>
    </a>
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="musique.mp3" type="audio/mpeg">
  Votre navigateur ne supporte pas l'audio.
</audio>

<script>
// --- 1. IMAGE ALÉATOIRE ---
const randomImages = [
  'd8ab894d-3aa4-435e-aa45-8c703bdeade8.png',
];
const randomIndex = Math.floor(Math.random() * randomImages.length);
const imgUrl = `url('${randomImages[randomIndex]}')`;
// Applique l'image sur la div de fond ET sur le body pour éviter tout noir
document.getElementById('randomBg').style.backgroundImage = imgUrl;
document.body.style.backgroundImage = imgUrl;
document.body.style.backgroundSize = 'cover';
document.body.style.backgroundPosition = 'center';

// --- 2. EFFET NEIGE ---
const snowContainer = document.getElementById('snow-container');
const snowColors = ['#ffffff', '#ff0000'];

function createSnowflake() {
  const flake = document.createElement('div');
  const size = Math.random() * 4 + 2;
  flake.style.cssText = `
    position: absolute;
    width: ${size}px;
    height: ${size}px;
    background: ${Math.random() > 0.3 ? snowColors[0] : snowColors[1]};
    border-radius: 50%;
    left: ${Math.random() * 100}vw;
    top: -10px;
    opacity: ${Math.random() * 0.5 + 0.3};
    pointer-events: none;
    animation: fall ${Math.random() * 5 + 5}s linear forwards;
  `;
  snowContainer.appendChild(flake);
  flake.addEventListener('animationend', () => flake.remove());
}

setInterval(createSnowflake, 100);

// --- 3. MUSIQUE ---
const musicBtn = document.getElementById('musicBtn');
const bgMusic  = document.getElementById('bgMusic');
let isPlaying  = false;

musicBtn.addEventListener('click', () => {
  if (isPlaying) {
    bgMusic.pause();
    isPlaying = false;
    musicBtn.textContent = '🎵 Musique: OFF';
    musicBtn.style.backgroundColor = 'rgba(0, 0, 0, 0.5)';
  } else {
    bgMusic.play()
      .then(() => {
        isPlaying = true;
        musicBtn.textContent = '🔊 Musique: ON';
        musicBtn.style.backgroundColor = 'rgba(255, 0, 0, 0.6)';
      })
      .catch(() => {
        alert("Veuillez interagir avec la page pour activer l'audio.");
      });
  }
});
</script>
</body>
</html>
